# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fixtures:
    name: fixtures-up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build fixtures
        run: bash -c 'cd test/testdata && ./build-fixtures.go'
      - name: Diff fixtures
        run: git diff --exit-code test/testdata

  build:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        go: ["1.25", "1.26"]
    runs-on: ${{ matrix.os }}

    name: Build (Go ${{ matrix.go }}, OS ${{ matrix.os }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go test -race -bench='.+' -v ./...
        run: go test -race -bench='.+' -v ./...
