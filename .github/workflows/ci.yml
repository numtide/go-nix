# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fixtures:
    name: Verify fixtures are up-to-date
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.34.1/install
      - name: Regenerate fixtures
        run: nix develop --command bash -c 'cd test/testdata && ./build-fixtures.go'
      - name: Check for fixture drift
        run: git diff --exit-code test/testdata

  build:
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        go: ["1.26"]
    runs-on: ${{ matrix.os }}

    name: Build (Go ${{ matrix.go }}, OS ${{ matrix.os }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Run tests with race detector and benchmarks
        run: go test -race -bench='.+' -v ./...
